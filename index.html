<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residency Tracker</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-canvas: #f4f6f8;
            --surface-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            
            --dlsu-green: #0a5c36;
            --dlsu-green-hover: #074528;
            --status-in: #10b981;
            --status-in-hover: #059669;
            --status-out: #f43f5e;
            --status-out-hover: #e11d48;
            
            --border-soft: #e2e8f0;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-canvas: #0f172a;
            --surface-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-soft: #334155;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
        }

        body, header, .card, .user-profile-chip, .metric-display, input, button, select {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-canvas);
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 40px;
        }

        /* Minimalist Loading Screen Styles */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-canvas);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #loadingScreen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-text {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        header {
            background-color: var(--surface-card);
            border-bottom: 1px solid var(--border-soft);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            width: 100%;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo {
            width: 8px;
            height: 24px;
            background-color: var(--dlsu-green);
            border-radius: 4px;
        }

        .brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-main);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            max-width: 100%;
        }

        .theme-toggle-btn {
            background: none;
            border: 1px solid var(--border-soft);
            background: var(--surface-card);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            color: var(--text-main);
            flex-shrink: 0;
        }

        .theme-toggle-btn:hover {
            background: var(--bg-canvas);
            border-color: var(--text-muted);
        }

        .theme-toggle-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .user-profile-chip {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-canvas);
            padding: 6px 14px;
            border-radius: 9999px;
            border: 1px solid var(--border-soft);
            max-width: 100%;
            min-width: 0;
        }

        .user-email {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .admin-badge {
            background-color: rgba(10, 92, 54, 0.1);
            color: var(--dlsu-green);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        [data-theme="dark"] .admin-badge {
            background-color: rgba(16, 185, 129, 0.15);
            color: #34d399;
        }

        .logout-link {
            color: var(--status-out);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s ease;
            flex-shrink: 0;
        }

        .logout-link:hover {
            color: var(--status-out-hover);
            text-decoration: underline;
        }

        .menu-btn {
            background: none;
            border: 1px solid var(--border-soft);
            background: var(--surface-card);
            cursor: pointer;
            padding: 10px 12px;
            border-radius: 8px;
            transition: all 0.2s;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 40px;
            height: 36px;
        }

        .menu-btn:hover {
            background: var(--bg-canvas);
            border-color: var(--text-muted);
        }

        .menu-btn span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: var(--text-main);
            border-radius: 2px;
            transition: all 0.2s ease;
        }

        .nav-menu {
            position: absolute;
            top: 45px;
            right: 0;
            background: var(--surface-card);
            border: 1px solid var(--border-soft);
            box-shadow: var(--shadow-md);
            display: none;
            flex-direction: column;
            z-index: 101;
            border-radius: 12px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 6px;
        }

        .nav-menu.show {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        .nav-menu button {
            background: var(--surface-card);
            border: none;
            padding: 10px 16px;
            cursor: pointer;
            text-align: left;
            width: 170px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 8px;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .nav-menu button:hover {
            background: var(--bg-canvas);
            color: var(--dlsu-green);
        }
        [data-theme="dark"] .nav-menu button:hover {
            color: #34d399;
        }

        .login-box-container {
            max-width: 420px;
            margin: 100px auto;
            padding: 0 24px;
        }

        .app-layout {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            width: 100%;
        }

        @media (min-width: 992px) {
            .app-layout {
                grid-template-columns: 380px 1fr;
                align-items: start;
            }
        }

        .card {
            background: var(--surface-card);
            border-radius: 16px;
            border: 1px solid var(--border-soft);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            width: 100%;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .panel-heading {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .roster-heading-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .roster-sort-select {
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-soft);
            background-color: var(--surface-card);
            color: var(--text-main);
            cursor: pointer;
            outline: none;
        }
        .roster-sort-select:focus {
            border-color: var(--dlsu-green);
        }
        [data-theme="dark"] .roster-sort-select {
            background-color: var(--bg-canvas);
        }

        .warning {
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            display: none;
            line-height: 1.4;
            background-color: #fff1f2;
            border: 1px solid #ffe4e6;
            border-left: 4px solid var(--status-out);
            color: #991b1b;
        }
        [data-theme="dark"] .warning {
            background-color: #991b1b20;
            border-color: #991b1b40;
            color: #fca5a5;
        }

        .metric-display {
            text-align: center;
            padding: 18px 0;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid var(--border-soft);
            margin-bottom: 16px;
        }
        [data-theme="dark"] .metric-display {
            background: #1e293b60;
        }

        .metric-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .metric-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--dlsu-green);
            letter-spacing: -0.04em;
            margin-top: 2px;
        }
        [data-theme="dark"] .metric-value {
            color: #34d399;
        }

        .metric-value.duration {
            color: #b45309;
        }
        [data-theme="dark"] .metric-value.duration {
            color: #fbbf24;
        }

        /* Rest of your unchanged core layout styles go here */
    </style>
</head>
<body>

    <div id="loadingScreen">
        <div class="loading-text">Loading...</div>
    </div>

    <header>
        <div class="nav-container">
            <div class="brand">
                <div class="brand-logo"></div>
                <h1 id="headerTitle">Welcome!</h1>
            </div>
            <div class="header-controls" id="headerControls" style="display: none;">
                <button class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle structural interface brightness mapping context">
                    <svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M16.5 12a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/></svg>
                </button>
                <div class="user-profile-chip">
                    <span class="user-email" id="userEmailDisplay">...</span>
                    <span class="admin-badge" id="adminBadge" style="display: none;">Admin</span>
                </div>
                <button class="menu-btn" onclick="toggleMenu()" id="menuButton" style="display: none;">
                    <span></span><span></span><span></span>
                </button>
                <div class="nav-menu" id="navMenu">
                    <button id="adminPanelToggle" style="display: none;" onclick="setView('admin')">Admin Console</button>
                    <button onclick="handleLogout()" class="logout-link" style="text-align: left; padding: 10px 16px;">Sign Out</button>
                </div>
            </div>
        </div>
    </header>

    <div class="login-box-container" id="loginView">
        <div class="card" style="text-align: center; padding: 40px 32px;">
            <div style="background-color: rgba(10, 92, 54, 0.08); width: 64px; height: 64px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
                <svg width="28" height="28" fill="var(--dlsu-green)" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            </div>
            <h2 style="font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px;">Sign In</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 32px; line-height: 1.5;">Please authorize using your DLSU Google Account.</p>
            <div style="display: flex; justify-content: center;" id="gSignInWrapper">
                <div id="g_id_onload"
                     data-client_id="276378730888-gsvgo6j5nvp6o2mmfvghhjn8ubufsilu.apps.googleusercontent.com"
                     data-context="signin"
                     data-callback="handleCredentialResponse"
                     data-auto_select="false"
                     data-itp_support="true">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left">
                </div>
            </div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRPyUfRVK7MTuqzdf-T8901TnKrN_4mO_B8SImg0YGLqzhOG_Uet_apqmZzdIFYUNYGg/exec"; 
        const CLIENT_API_TOKEN = "Residency_Secure_Token_2026";

        // Loading Screen Management initialization
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                const loader = document.getElementById('loadingScreen');
                if (loader) {
                    loader.classList.add('hidden');
                }
            }, 5000); // Strict 5 second window execution wrapper
        });

        // Remaining core logical sequence and validation handlers go here...
    </script>
</body>
</html>
